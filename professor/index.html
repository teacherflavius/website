<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Professor - Teacher Flávio</title>
  <link rel="canonical" href="/professor/">
  <script>
    (async function () {
      const response = await fetch('/professor.html', { cache: 'no-store' });
      const html = await response.text();
      document.open();
      document.write(html.replace('<head>', '<head>\n  <base href="/">'));
      document.close();
    })();
  </script>
</head>
<body>
  <p>Carregando área do professor...</p>
</body>
</html>

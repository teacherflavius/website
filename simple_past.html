<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Past Quiz</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="quiz_core.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    QuizCore.renderQuiz({
      title: "Simple Past",
      feedbackPerfect: "Perfeito! Você domina o Simple Past.",
      questions: [
        { question: "Yesterday, she ___ to school by bus.", options: ["go", "goes", "went", "goed"], answer: "went", explanation: "O passado de 'go' é irregular: 'went'." },
        { question: "They ___ a movie last night.", options: ["watch", "watched", "watches", "watching"], answer: "watched", explanation: "Em verbos regulares no Simple Past, geralmente adicionamos -ed." },
        { question: "I ___ not like the food.", options: ["did", "was", "do", "am"], answer: "did", explanation: "Na negativa do Simple Past, usamos 'did not' + verbo na forma base." },
        { question: "___ you visit your grandmother last weekend?", options: ["Do", "Does", "Did", "Were"], answer: "Did", explanation: "Em perguntas no Simple Past, usamos 'Did' + sujeito + verbo na forma base." },
        { question: "He ___ very tired after work.", options: ["was", "were", "is", "be"], answer: "was", explanation: "O passado de 'be' com he/she/it é 'was'." },
        { question: "We ___ at home on Sunday.", options: ["was", "were", "are", "be"], answer: "were", explanation: "O passado de 'be' com we/you/they é 'were'." },
        { question: "She did not ___ the answer.", options: ["knew", "knows", "know", "knowing"], answer: "know", explanation: "Depois de 'did not', o verbo principal fica na forma base." },
        { question: "My father ___ a new car two years ago.", options: ["buy", "buys", "bought", "buyed"], answer: "bought", explanation: "O passado de 'buy' é irregular: 'bought'." },
        { question: "The students ___ hard for the test.", options: ["studied", "studyed", "studies", "study"], answer: "studied", explanation: "Quando o verbo termina em consoante + y, trocamos y por i e adicionamos -ed: study → studied." },
        { question: "Did they ___ English yesterday?", options: ["studied", "study", "studies", "studying"], answer: "study", explanation: "Em perguntas com 'Did', usamos o verbo principal na forma base." }
      ]
    });
  </script>
</body>
</html>

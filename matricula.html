<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matrícula - Teacher Flávio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      font-family: Georgia, serif;
      color: #f1f5f9;
    }
    .box {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(12px);
    }
    .header { text-align: center; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: linear-gradient(90deg,#818cf8,#a78bfa);
      color: #fff;
      font-size: 11px;
      font-family: monospace;
      letter-spacing: 3px;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    h1 { font-size: 32px; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 13px 14px;
      color: #f1f5f9;
      font-size: 15px;
      font-family: Georgia, serif;
      margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: #818cf8; }
    .password-field { position: relative; }
    .password-field input { padding-right: 112px; }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: auto;
      margin: 0;
      padding: 7px 10px;
      border-radius: 9px;
      border: 1px solid rgba(129,140,248,0.35);
      background: rgba(255,255,255,0.05);
      color: #cbd5e1;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      font-family: Georgia, serif;
    }
    button, a.btn {
      width: 100%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg,#818cf8,#a78bfa);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      font-family: Georgia, serif;
      text-decoration: none;
      margin-top: 6px;
    }
    .secondary {
      background: rgba(255,255,255,0.05) !important;
      border: 1.5px solid rgba(129,140,248,0.35) !important;
      color: #cbd5e1 !important;
    }
    .error { min-height: 20px; color: #fca5a5; font-size: 13px; margin: 8px 0; line-height: 1.5; }
    .success { color: #6ee7b7; font-size: 13px; line-height: 1.5; margin: 8px 0; }
    .code-box {
      display: none;
      text-align: center;
      background: rgba(110,231,183,0.08);
      border: 1px solid rgba(110,231,183,0.35);
      border-radius: 16px;
      padding: 18px;
      margin: 16px 0;
    }
    .code-box strong {
      display: block;
      color: #6ee7b7;
      font-size: 34px;
      font-family: monospace;
      letter-spacing: 4px;
      margin-top: 8px;
    }
    .links { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Matrícula</h1>
      <p>Preencha seus dados para criar seu acesso de estudante.</p>
    </div>

    <form id="enrollmentForm">
      <input id="name" type="text" placeholder="Nome completo" required />
      <input id="cpf" type="text" placeholder="CPF" inputmode="numeric" maxlength="14" required />
      <input id="email" type="email" placeholder="Email" required />
      <input id="whatsapp" type="tel" placeholder="WhatsApp" inputmode="tel" required />
      <div class="password-field">
        <input id="password" type="password" placeholder="Senha" minlength="6" required />
        <button type="button" class="toggle-password" data-target="password">MOSTRAR</button>
      </div>
      <div id="message" class="error"></div>
      <button type="submit">CONCLUIR MATRÍCULA</button>
    </form>

    <div id="codeBox" class="code-box">
      <p>Matrícula concluída. Seu código de matrícula é:</p>
      <strong id="enrollmentCode"></strong>
    </div>

    <div class="links">
      <a class="btn secondary" href="login.html">JÁ SOU MATRICULADO</a>
      <a class="btn secondary" href="index.html">VOLTAR AO INÍCIO</a>
    </div>
  </div>

  <script>
    function onlyDigits(value) {
      return String(value || "").replace(/\D/g, "");
    }

    function formatCpf(value) {
      const digits = onlyDigits(value).slice(0, 11);
      return digits
        .replace(/(\d{3})(\d)/, "$1.$2")
        .replace(/(\d{3})(\d)/, "$1.$2")
        .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    }

    document.getElementById("cpf").addEventListener("input", function () {
      this.value = formatCpf(this.value);
    });

    document.querySelectorAll(".toggle-password").forEach(function (button) {
      button.addEventListener("click", function () {
        const input = document.getElementById(button.dataset.target);
        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        button.textContent = isHidden ? "OCULTAR" : "MOSTRAR";
      });
    });

    document.getElementById("enrollmentForm").addEventListener("submit", async function (event) {
      event.preventDefault();
      const message = document.getElementById("message");
      const codeBox = document.getElementById("codeBox");
      const codeEl = document.getElementById("enrollmentCode");
      message.className = "error";
      message.textContent = "";
      codeBox.style.display = "none";

      if (!Auth.isConfigured()) {
        Auth.showConfigWarning();
        message.textContent = "Supabase ainda não configurado.";
        return;
      }

      try {
        const result = await Auth.enrollStudent({
          name: document.getElementById("name").value.trim(),
          cpf: document.getElementById("cpf").value.trim(),
          email: document.getElementById("email").value.trim(),
          whatsapp: document.getElementById("whatsapp").value.trim(),
          password: document.getElementById("password").value
        });

        codeEl.textContent = result.enrollment_code;
        codeBox.style.display = "block";
        message.className = "success";
        message.textContent = "Matrícula registrada no Supabase. Se a confirmação por e-mail estiver ativa, confirme seu e-mail antes de entrar.";
        document.getElementById("enrollmentForm").reset();
        document.getElementById("password").type = "password";
        document.querySelector(".toggle-password").textContent = "MOSTRAR";
      } catch (err) {
        message.className = "error";
        message.textContent = err.message || "Não foi possível concluir a matrícula.";
      }
    });
  </script>
</body>
</html>

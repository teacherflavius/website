<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Área do Estudante - Teacher Flávio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
      font-family: Georgia, serif;
    }
    body.auth-checking .container { display: none; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .container { width: 100%; max-width: 620px; animation: fadeInUp 0.5s ease; }
    .top-links { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .top-link { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(129,140,248,0.35); border-radius: 10px; padding: 9px 16px; color: #818cf8; font-size: 13px; font-family: Georgia, serif; text-decoration: none; }
    .badge { display: inline-block; background: linear-gradient(90deg, #818cf8, #a78bfa); color: #fff; font-size: 11px; font-family: monospace; letter-spacing: 3px; padding: 4px 14px; border-radius: 20px; margin-bottom: 12px; }
    .header { text-align: center; margin-bottom: 38px; }
    .header h1 { color: #f1f5f9; font-size: 38px; font-weight: bold; letter-spacing: -1px; margin-bottom: 8px; }
    .status { margin-top: 12px; color: #cbd5e1; font-size: 13px; line-height: 1.5; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(129,140,248,0.3), transparent); margin-bottom: 32px; }
    .menu-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .menu-button { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 22px 24px; display: flex; align-items: center; justify-content: space-between; gap: 18px; color: #f1f5f9; font-size: 17px; font-weight: bold; letter-spacing: 0.5px; text-decoration: none; transition: transform 0.2s, border-color 0.2s, background 0.2s; backdrop-filter: blur(12px); }
    .menu-button:hover { transform: translateY(-3px); border-color: rgba(129,140,248,0.5); background: rgba(129,140,248,0.07); }
    .menu-button span:first-child { display: flex; align-items: center; gap: 12px; }
    .icon { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, #818cf8, #a78bfa); display: inline-flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .arrow { color: #475569; font-size: 22px; transition: color 0.2s, transform 0.2s; }
    .menu-button:hover .arrow { color: #818cf8; transform: translateX(4px); }
    @media (min-width: 680px) { .menu-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body class="auth-checking">
  <div class="container">
    <div class="top-links">
      <a class="top-link" href="index.html">HOME</a>
      <a class="top-link" href="perfil.html">MEU PERFIL</a>
    </div>

    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Área do Estudante</h1>
      <div id="loginStatus" class="status">Verificando acesso...</div>
    </div>

    <div class="divider"></div>

    <div class="menu-grid">
      <a class="menu-button" href="links_das_aulas.html">
        <span><span class="icon">🔗</span>LINKS DAS AULAS</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="exercicios.html">
        <span><span class="icon">🧩</span>EXERCÍCIOS</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="frequência.html">
        <span><span class="icon">✅</span>FREQUÊNCIA</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="https://whatsapp.com/channel/0029VbD0Obo11ulGTQT5cy0w" target="_blank" rel="noopener noreferrer">
        <span><span class="icon">🗺️</span>ROTEIRO DE ESTUDOS</span>
        <span class="arrow">›</span>
      </a>

      <a id="guiaDoEstudanteLink" class="menu-button" href="https://canva.link/guiadoestudante" target="_blank" rel="noopener noreferrer">
        <span><span class="icon">📘</span>GUIA DO ESTUDANTE</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="https://drive.google.com/drive/folders/1VHsskjvP7s4gw94PqNRCTpaL-xC0vmjg" target="_blank" rel="noopener noreferrer">
        <span><span class="icon">🎥</span>AULAS GRAVADAS</span>
        <span class="arrow">›</span>
      </a>
    </div>
  </div>

  <script>
    let currentSession = null;

    function redirectToLogin() {
      window.location.href = "login.html?next=" + encodeURIComponent("area_do_estudante.html");
    }

    async function guardStudentArea() {
      if (!window.Auth || !Auth.isConfigured()) {
        if (window.Auth && Auth.showConfigWarning) Auth.showConfigWarning();
        document.body.classList.remove("auth-checking");
        const status = document.getElementById("loginStatus");
        if (status) status.textContent = "Supabase ainda não configurado.";
        return false;
      }

      currentSession = await Auth.getSession();

      if (!currentSession || !currentSession.user) {
        redirectToLogin();
        return false;
      }

      document.body.classList.remove("auth-checking");
      return true;
    }

    async function updateStatus() {
      const isAllowed = await guardStudentArea();
      if (!isAllowed) return;

      const status = document.getElementById("loginStatus");
      const profile = await Auth.getProfile();
      status.textContent = `Logado como ${profile && profile.name ? profile.name : currentSession.user.email}.`;
    }

    updateStatus();
  </script>
</body>
</html>

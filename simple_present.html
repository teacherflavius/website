<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Present Quiz</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    window.QUIZ_RESULTS_ENDPOINT = "https://script.google.com/macros/s/AKfycbyr53U30DMi3Shft8V2fLfQI0qDrQ1CrMB6XTwhEAy2I16jPI4m7fpFCiul9Dw2jpEL/exec";
  </script>
  <script src="quiz_core.js"></script>
  <script src="notify_teacher.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    QuizCore.renderQuiz({
      title: "Simple Present",
      feedbackPerfect: "Perfeito! Você domina o Simple Present!",
      questions: [
        { question: "She ___ to school every day.", options: ["go", "goes", "going", "goed"], answer: "goes", explanation: "Com he/she/it, adicionamos -s ou -es ao verbo." },
        { question: "They ___ not like spicy food.", options: ["does", "do", "is", "are"], answer: "do", explanation: "Com they/we/you/I, usamos 'do not' para negativas." },
        { question: "___ he play soccer on weekends?", options: ["Do", "Is", "Does", "Are"], answer: "Does", explanation: "Com he/she/it, usamos 'Does' para perguntas." },
        { question: "My brother ___ in a hospital.", options: ["work", "working", "works", "worked"], answer: "works", explanation: "Com he/she/it, adicionamos -s ao verbo." },
        { question: "I ___ coffee every morning.", options: ["drinks", "drinking", "drink", "drinked"], answer: "drink", explanation: "Com I, o verbo não recebe -s." },
        { question: "The sun ___ in the east.", options: ["rise", "raised", "rises", "rising"], answer: "rises", explanation: "Fatos gerais usam Simple Present. Com 'the sun' (it), adicionamos -s." },
        { question: "___ you speak English?", options: ["Does", "Do", "Are", "Is"], answer: "Do", explanation: "Com you/I/we/they, usamos 'Do' para perguntas." },
        { question: "She ___ not understand the question.", options: ["do", "does", "is", "have"], answer: "does", explanation: "Com she/he/it, usamos 'does not' para negativas." },
        { question: "Water ___ at 100 degrees Celsius.", options: ["boil", "boils", "boiled", "boiling"], answer: "boils", explanation: "Fatos científicos usam Simple Present. Com 'water' (it), adicionamos -s ao verbo." },
        { question: "We ___ English classes on Mondays and Wednesdays.", options: ["has", "have", "having", "haves"], answer: "have", explanation: "Com we/you/they/I, o verbo não recebe -s. 'Have' é irregular e não vira 'haves'." }
      ]
    });
  </script>
</body>
</html>

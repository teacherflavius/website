<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>There to Be Quiz</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="quiz_core.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    QuizCore.renderQuiz({
      title: "There to Be",
      subtitle: "Escolha a conjugação correta do verbo there to be",
      feedbackPerfect: "Perfeito! Você domina o There to Be!",
      questions: [
        { question: "___ a dog in the garden.", options: ["There are", "There is", "There were", "Is there"], answer: "There is", explanation: "Usamos 'There is' com substantivos no singular: a dog → singular." },
        { question: "___ any milk in the fridge?", options: ["There is", "Are there", "Is there", "There are"], answer: "Is there", explanation: "Na forma interrogativa com substantivo incontável ou singular, usamos 'Is there...?'" },
        { question: "___ three chairs in the kitchen.", options: ["There is", "Is there", "Are there", "There are"], answer: "There are", explanation: "Usamos 'There are' com substantivos no plural: three chairs → plural." },
        { question: "___ a bus stop near here?", options: ["There is", "Are there", "There are", "Is there"], answer: "Is there", explanation: "Para perguntar sobre algo no singular, usamos 'Is there...?'" },
        { question: "There ___ not a lamp in the bedroom.", options: ["are", "were", "is", "be"], answer: "is", explanation: "Forma negativa no singular: 'There is not' ou 'There isn't'." },
        { question: "___ any students in the classroom?", options: ["Is there", "There are", "There is", "Are there"], answer: "Are there", explanation: "Para perguntar sobre algo no plural, usamos 'Are there...?'" },
        { question: "There ___ not any eggs in the box.", options: ["is", "be", "was", "are"], answer: "are", explanation: "Forma negativa no plural: 'There are not' ou 'There aren't'." },
        { question: "There ___ a new school in my neighbourhood.", options: ["are", "were", "be", "is"], answer: "is", explanation: "Usamos 'There is' com singular no afirmativo." },
        { question: "___ two windows in this room.", options: ["There is", "Is there", "Are there", "There are"], answer: "There are", explanation: "Usamos 'There are' com plural no afirmativo." },
        { question: "There ___ not a supermarket on this street.", options: ["are", "be", "were", "is"], answer: "is", explanation: "Forma negativa no singular: 'There is not' ou 'There isn't'." }
      ]
    });
  </script>
</body>
</html>

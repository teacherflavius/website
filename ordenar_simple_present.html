<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ordenar Frases - Simple Present</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="auth.js"></script>
  <script src="supabase_results.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="quiz_core.js"></script>
  <script src="notify_teacher.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      font-family: Georgia, serif;
      color: #f1f5f9;
      overflow-x: hidden;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .container { width: 100%; max-width: 560px; animation: fadeIn 0.4s ease; }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(129,140,248,0.35);
      border-radius: 10px;
      padding: 9px 18px;
      color: #818cf8;
      font-size: 14px;
      font-family: Georgia, serif;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .header { text-align: center; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: linear-gradient(90deg,#818cf8,#a78bfa);
      color: #fff;
      font-size: 11px;
      font-family: monospace;
      letter-spacing: 3px;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    h1 { color: #f1f5f9; font-size: 30px; margin-bottom: 8px; letter-spacing: -1px; }
    .subtitle { color: #94a3b8; font-size: 14px; font-style: italic; line-height: 1.5; }
    .progress {
      height: 4px;
      background: #1e293b;
      border-radius: 99px;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#818cf8,#a78bfa);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(12px);
    }
    .counter { margin-bottom: 16px; }
    .counter strong { color: #a78bfa; font-size: 28px; }
    .counter span { color: #475569; font-size: 18px; }
    .instruction { color: #cbd5e1; font-size: 15px; line-height: 1.6; margin-bottom: 18px; }
    .translation {
      color: #94a3b8;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
    }
    .word-area {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 88px;
      background: rgba(15,23,42,0.45);
      border: 1.5px dashed rgba(129,140,248,0.35);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 18px;
      touch-action: none;
    }
    .word {
      user-select: none;
      touch-action: none;
      cursor: grab;
      background: rgba(129,140,248,0.16);
      border: 1.5px solid rgba(129,140,248,0.45);
      color: #e0e7ff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 16px;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
    }
    .word:active { cursor: grabbing; }
    .word.dragging { opacity: 0.25; transform: scale(0.96); }
    .ghost {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      background: linear-gradient(90deg,#818cf8,#a78bfa);
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 16px;
      line-height: 1;
      box-shadow: 0 14px 35px rgba(0,0,0,0.35);
      transform: translate(-50%, -50%);
    }
    .feedback {
      min-height: 24px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .feedback.ok { color: #6ee7b7; }
    .feedback.error { color: #fca5a5; }
    .actions { display: flex; flex-direction: column; gap: 10px; }
    button, .button-link {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg,#818cf8,#a78bfa);
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      font-family: Georgia, serif;
      text-align: center;
      text-decoration: none;
    }
    .secondary {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(129,140,248,0.35);
      color: #cbd5e1;
    }
    .result { text-align: center; }
    .result .emoji { font-size: 56px; margin-bottom: 12px; }
    .result h2 { font-size: 26px; margin-bottom: 14px; }
    .result p { color: #94a3b8; line-height: 1.6; margin-bottom: 16px; }
    .save-message { color: #6ee7b7 !important; font-size: 13px; margin-bottom: 22px !important; }
    .save-message.error { color: #fca5a5 !important; }
  </style>
</head>
<body>
  <div class="container">
    <a href="exercicios_ordenar_frases.html" class="btn-back">VOLTAR</a>
    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Simple Present</h1>
      <p class="subtitle">Arraste as palavras com o dedo para formar a frase correta.</p>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

    <div class="card" id="app"></div>
  </div>

  <script>
    const EXERCISE_TITLE = "Ordenar Frases - Simple Present";
    const exercises = [
      { words: ["drink", "I", "water"], answer: ["I", "drink", "water"], translation: "Eu bebo água." },
      { words: ["likes", "She", "music"], answer: ["She", "likes", "music"], translation: "Ela gosta de música." },
      { words: ["play", "They", "soccer"], answer: ["They", "play", "soccer"], translation: "Eles jogam futebol." },
      { words: ["works", "He", "at", "home"], answer: ["He", "works", "at", "home"], translation: "Ele trabalha em casa." },
      { words: ["English", "We", "study"], answer: ["We", "study", "English"], translation: "Nós estudamos inglês." },
      { words: ["does", "not", "coffee", "She", "drink"], answer: ["She", "does", "not", "drink", "coffee"], translation: "Ela não bebe café." },
      { words: ["Do", "you", "like", "pizza"], answer: ["Do", "you", "like", "pizza"], translation: "Você gosta de pizza?" },
      { words: ["goes", "He", "to", "school"], answer: ["He", "goes", "to", "school"], translation: "Ele vai para a escola." },
      { words: ["They", "do", "not", "watch", "TV"], answer: ["They", "do", "not", "watch", "TV"], translation: "Eles não assistem TV." },
      { words: ["Does", "she", "speak", "English"], answer: ["Does", "she", "speak", "English"], translation: "Ela fala inglês?" }
    ];

    let current = 0;
    let score = 0;
    let words = [];
    let draggingElement = null;
    let ghost = null;
    let activePointerId = null;
    let resultSaved = false;

    const app = document.getElementById("app");
    const progressBar = document.getElementById("progressBar");

    async function requireLoggedStudent() {
      if (!window.Auth || !Auth.isConfigured || !Auth.isConfigured()) {
        if (window.Auth && Auth.showConfigWarning) Auth.showConfigWarning();
        return true;
      }

      const user = await Auth.requireAuth();
      if (!user) return false;

      const profile = await Auth.getProfile();
      const student = {
        name: profile && profile.name ? profile.name : "Aluno",
        email: profile && profile.email ? profile.email : user.email
      };

      if (window.QuizCore && QuizCore.setCurrentStudent) {
        QuizCore.setCurrentStudent(student);
      }

      return true;
    }

    function updateProgress() {
      progressBar.style.width = `${(current / exercises.length) * 100}%`;
    }

    function cleanupDrag() {
      document.removeEventListener("pointermove", onDrag);
      document.removeEventListener("pointerup", endDrag);
      document.removeEventListener("pointercancel", endDrag);
      document.querySelectorAll(".word.dragging").forEach(item => item.classList.remove("dragging"));
      document.querySelectorAll(".ghost").forEach(item => item.remove());
      ghost = null;
      draggingElement = null;
      activePointerId = null;
    }

    function renderExercise() {
      cleanupDrag();
      updateProgress();
      const exercise = exercises[current];
      words = [...exercise.words];

      app.innerHTML = `
        <div class="counter"><strong>${current + 1}</strong><span> / ${exercises.length}</span></div>
        <p class="instruction">Organize as palavras abaixo para formar uma frase correta em inglês.</p>
        <div class="translation">Tradução: ${exercise.translation}</div>
        <div class="word-area" id="wordArea"></div>
        <div class="feedback" id="feedback"></div>
        <div class="actions">
          <button onclick="checkAnswer()">Verificar</button>
          <button class="secondary" onclick="resetCurrent()">Embaralhar novamente</button>
        </div>
      `;
      renderWords();
    }

    function renderWords() {
      const wordArea = document.getElementById("wordArea");
      wordArea.innerHTML = "";
      words.forEach((word) => {
        const item = document.createElement("div");
        item.className = "word";
        item.textContent = word;
        item.addEventListener("pointerdown", startDrag);
        wordArea.appendChild(item);
      });
      syncWordsFromDom();
    }

    function syncWordsFromDom() {
      const wordArea = document.getElementById("wordArea");
      if (!wordArea) return;
      words = Array.from(wordArea.querySelectorAll(".word")).map(item => item.textContent);
    }

    function startDrag(event) {
      event.preventDefault();
      cleanupDrag();

      draggingElement = event.currentTarget;
      activePointerId = event.pointerId;
      draggingElement.classList.add("dragging");

      ghost = document.createElement("div");
      ghost.className = "ghost";
      ghost.textContent = draggingElement.textContent;
      document.body.appendChild(ghost);
      moveGhost(event.clientX, event.clientY);

      document.addEventListener("pointermove", onDrag, { passive: false });
      document.addEventListener("pointerup", endDrag);
      document.addEventListener("pointercancel", endDrag);
    }

    function moveGhost(x, y) {
      if (!ghost) return;
      ghost.style.left = x + "px";
      ghost.style.top = y + "px";
    }

    function onDrag(event) {
      if (activePointerId !== null && event.pointerId !== activePointerId) return;
      event.preventDefault();
      moveGhost(event.clientX, event.clientY);

      const wordArea = document.getElementById("wordArea");
      const target = document.elementFromPoint(event.clientX, event.clientY);
      const targetWord = target && target.closest ? target.closest(".word") : null;

      if (!wordArea || !targetWord || targetWord === draggingElement || !wordArea.contains(targetWord)) return;

      const targetRect = targetWord.getBoundingClientRect();
      const shouldInsertAfter = event.clientX > targetRect.left + targetRect.width / 2 || event.clientY > targetRect.top + targetRect.height / 2;

      if (shouldInsertAfter) {
        wordArea.insertBefore(draggingElement, targetWord.nextSibling);
      } else {
        wordArea.insertBefore(draggingElement, targetWord);
      }
      syncWordsFromDom();
    }

    function endDrag(event) {
      if (activePointerId !== null && event.pointerId !== activePointerId) return;
      cleanupDrag();
      syncWordsFromDom();
    }

    function checkAnswer() {
      syncWordsFromDom();
      const exercise = exercises[current];
      const feedback = document.getElementById("feedback");
      const userAnswer = words.join(" ");
      const correctAnswer = exercise.answer.join(" ");

      if (userAnswer === correctAnswer) {
        score++;
        feedback.className = "feedback ok";
        feedback.textContent = "Correto!";
        cleanupDrag();
        setTimeout(nextExercise, 650);
      } else {
        feedback.className = "feedback error";
        feedback.textContent = "Ainda não. Tente reorganizar as palavras.";
      }
    }

    function resetCurrent() {
      cleanupDrag();
      words = [...exercises[current].words];
      renderWords();
      const feedback = document.getElementById("feedback");
      feedback.className = "feedback";
      feedback.textContent = "";
    }

    function nextExercise() {
      cleanupDrag();
      current++;
      if (current >= exercises.length) {
        renderResult();
      } else {
        renderExercise();
      }
    }

    async function saveWordOrderResult() {
      if (resultSaved) return;
      resultSaved = true;

      const student = window.QuizCore && QuizCore.getCurrentStudent ? QuizCore.getCurrentStudent() : null;
      const fallbackStudent = student || { name: "Aluno", email: "" };
      const status = document.getElementById("saveStatus");

      try {
        if (window.QuizCore && QuizCore.saveResult) {
          await QuizCore.saveResult({
            name: fallbackStudent.name,
            email: fallbackStudent.email,
            quiz: EXERCISE_TITLE,
            score: score,
            total: exercises.length,
            activity_type: "word_order"
          });
        } else if (window.Auth && Auth.saveActivityResult) {
          await Auth.saveActivityResult({
            activity_type: "word_order",
            activity_title: EXERCISE_TITLE,
            score: score,
            total: exercises.length
          });
        }

        if (status) {
          status.className = "save-message";
          status.textContent = "Resultado enviado ao Supabase.";
        }
      } catch (error) {
        console.warn("Erro ao salvar exercício no Supabase:", error);
        if (status) {
          status.className = "save-message error";
          status.textContent = "Não foi possível enviar o resultado ao Supabase.";
        }
      }
    }

    function renderResult() {
      cleanupDrag();
      progressBar.style.width = "100%";
      app.innerHTML = `
        <div class="result">
          <div class="emoji">🏆</div>
          <h2>Exercício concluído!</h2>
          <p>Você acertou ${score} de ${exercises.length} frases.</p>
          <p id="saveStatus" class="save-message">Enviando resultado ao Supabase...</p>
          <div class="actions">
            <button onclick="restart()">Tentar novamente</button>
            <a class="button-link secondary" href="exercicios_ordenar_frases.html">Voltar aos exercícios</a>
          </div>
        </div>
      `;
      saveWordOrderResult();
    }

    function restart() {
      cleanupDrag();
      current = 0;
      score = 0;
      resultSaved = false;
      renderExercise();
    }

    async function start() {
      app.innerHTML = '<p style="color:#94a3b8;text-align:center;line-height:1.6;">Carregando exercício...</p>';
      const allowed = await requireLoggedStudent();
      if (allowed) renderExercise();
    }

    window.addEventListener("blur", cleanupDrag);
    window.addEventListener("pagehide", cleanupDrag);

    start();
  </script>
</body>
</html>

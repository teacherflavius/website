<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quadro de Turmas - Teacher Flávio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js?v=20260503-2"></script>
  <script src="auth.js?v=20260503-2"></script>
  <link rel="stylesheet" href="professor.css?v=20260503-2">
  <style>
    body { align-items: flex-start; }
    .container { max-width: 1180px; }
    .board-wrap { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 14px; backdrop-filter: blur(12px); }
    .class-item { display: block; color: #f8fafc; text-decoration: none; border-radius: 12px; padding: 6px 6px 8px; transition: background 0.18s, transform 0.18s; }
    .class-item:hover { background: rgba(129,140,248,0.12); transform: translateY(-1px); }
    .class-title { display: block; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
    .class-number { display: block; color: #94a3b8; font-size: 11px; margin-top: -3px; margin-bottom: 6px; }
    .student-list { display: block; color: #cbd5e1; font-size: 12px; line-height: 1.45; text-align: left; }
    .student-list.empty-list { text-align: center; color: #94a3b8; font-style: italic; }
    .student-name { display: block; padding: 2px 0; }
    .pre-enrolled { color: #fde68a; font-size: 11px; }
    .legend { color: #94a3b8; font-size: 13px; line-height: 1.6; margin: 0 0 16px; text-align: center; }
    .warning { color: #fde68a; background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.22); border-radius: 12px; padding: 10px 12px; font-size: 13px; line-height: 1.5; margin-bottom: 12px; text-align: center; }
    .extra-section { margin-top: 0; }
    .extra-section h2 { color: #f1f5f9; font-size: 18px; margin: 0 0 12px; text-align: center; }
    .extra-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .extra-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 12px; }
    .error, .empty { color: #fca5a5; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px; text-align: center; line-height: 1.6; }
    .empty { color: #94a3b8; }
    @media(max-width: 720px) { .container { max-width: 100%; } .board-wrap { padding: 8px; } }
  </style>
</head>
<body class="auth-checking">
  <div class="container">
    <div class="top-links">
      <a class="top-link" href="professor.html">ÁREA DO PROFESSOR</a>
      <a class="top-link" href="/turmas/">TURMAS</a>
      <a class="top-link" href="/">HOME</a>
    </div>

    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Quadro de Turmas</h1>
      <div id="adminStatus" class="status">Verificando credenciais de professor...</div>
    </div>

    <div class="divider"></div>

    <p class="legend">Turmas cadastradas no Supabase e alunos inscritos em cada turma.</p>

    <div id="boardContainer" class="board-wrap">
      <div class="empty">Carregando turmas cadastradas no Supabase...</div>
    </div>
  </div>

  <script>
    let currentProfessorSession = null;
    let boardWarnings = [];

    function redirectToLogin() {
      window.location.href = "login.html?next=" + encodeURIComponent("quadro-de-turmas.html");
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    async function waitForAuthResources() {
      for (let i = 0; i < 10; i++) {
        if (window.Auth && window.SUPABASE_CONFIG && Auth.isConfigured()) return true;
        await sleep(150);
      }
      return !!(window.Auth && window.SUPABASE_CONFIG && Auth.isConfigured());
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function verifyTeacherAdmin() {
      const client = Auth.getClient();
      const response = await client.rpc("is_teacher_admin");
      if (response.error) throw response.error;
      return response.data === true;
    }

    async function loadTeacherClasses() {
      const client = Auth.getClient();
      const response = await client.rpc("get_teacher_classes");
      if (response.error) throw response.error;
      return response.data || [];
    }

    async function loadClassStudents(classNumber) {
      const client = Auth.getClient();
      const response = await client.rpc("get_teacher_class_students", { target_class_number: Number(classNumber) });
      if (response.error) {
        boardWarnings.push("Não foi possível carregar alunos da turma " + classNumber + ": " + response.error.message);
        return [];
      }
      return response.data || [];
    }

    function renderStudentNames(students) {
      if (!students || students.length === 0) {
        return '<span class="student-list empty-list">Sem alunos inscritos</span>';
      }

      return '<span class="student-list">' + students.map(function (student) {
        const name = student.student_name || student.name || student.student_email || student.email || "Aluno sem nome";
        const isPre = student.student_ref_type === "invite" || student.pre_enrollment_status === "pending";
        return '<span class="student-name">' + escapeHtml(name) + (isPre ? ' <span class="pre-enrolled">(pré)</span>' : '') + '</span>';
      }).join("") + '</span>';
    }

    function renderWarnings() {
      if (!boardWarnings.length) return "";
      return '<div class="warning">Alguns dados não foram carregados. Verifique se os scripts SQL de turmas e pré-matrículas foram executados. Primeiro aviso: ' + escapeHtml(boardWarnings[0]) + '</div>';
    }

    function renderSupabaseClasses(classes, studentsByClass) {
      if (!classes.length) {
        return '<div class="empty">Nenhuma turma cadastrada no Supabase.</div>';
      }

      const sortedClasses = classes.slice().sort(function (a, b) {
        return Number(a.class_number) - Number(b.class_number);
      });

      return '<div class="extra-section">' +
        '<h2>Outras turmas cadastradas no Supabase</h2>' +
        '<div class="extra-grid">' + sortedClasses.map(function (item) {
          const classNumber = Number(item.class_number);
          return '<a class="extra-card class-item" href="turma.html?id=' + encodeURIComponent(classNumber) + '">' +
            '<span class="class-title">' + escapeHtml(item.class_name || ("Turma " + classNumber)) + '</span>' +
            '<span class="class-number">Nº ' + escapeHtml(classNumber) + '</span>' +
            renderStudentNames(studentsByClass[String(classNumber)] || []) +
          '</a>';
        }).join("") + '</div></div>';
    }

    function renderBoard(classes, studentsByClass) {
      const container = document.getElementById("boardContainer");
      container.className = "board-wrap";
      container.innerHTML = renderWarnings() + renderSupabaseClasses(classes, studentsByClass);
    }

    async function loadBoard() {
      boardWarnings = [];
      const classes = await loadTeacherClasses();
      const studentsByClass = {};

      for (const classItem of classes) {
        const classNumber = Number(classItem.class_number);
        if (Number.isFinite(classNumber)) {
          studentsByClass[String(classNumber)] = await loadClassStudents(classNumber);
        }
      }

      renderBoard(classes, studentsByClass);
    }

    async function guardPage() {
      const status = document.getElementById("adminStatus");
      const resourcesReady = await waitForAuthResources();
      if (!resourcesReady) {
        status.textContent = "Não foi possível carregar a autenticação. Atualize a página ou limpe o cache do navegador.";
        document.body.classList.remove("auth-checking");
        return;
      }

      currentProfessorSession = await Auth.getSession();
      if (!currentProfessorSession || !currentProfessorSession.user) {
        redirectToLogin();
        return;
      }

      try {
        const isAdmin = await verifyTeacherAdmin();
        if (!isAdmin) {
          status.textContent = "Acesso negado. Este usuário não está cadastrado como professor.";
          document.body.classList.remove("auth-checking");
          return;
        }
        status.textContent = "Professor autenticado: " + currentProfessorSession.user.email + ".";
        document.body.classList.remove("auth-checking");
        await loadBoard();
      } catch (error) {
        status.textContent = "Não foi possível carregar o quadro de turmas.";
        const container = document.getElementById("boardContainer");
        container.className = "error";
        container.textContent = "Erro ao carregar turmas e alunos: " + (error.message || "erro desconhecido") + ". Execute supabase_turmas.sql e, se estiver usando pré-matrículas, supabase_pre_matriculas_turmas.sql no Supabase.";
        document.body.classList.remove("auth-checking");
      }
    }

    guardPage();
  </script>
  <script src="animated_cards.js?v=20260503-2"></script>
</body>
</html>

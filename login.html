<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Teacher Flávio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js?v=20260429-4"></script>
  <script src="auth.js?v=20260429-4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); display: flex; align-items: center; justify-content: center; padding: 32px 16px; font-family: Georgia, serif; color: #f1f5f9; }
    .box { width: 100%; max-width: 440px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 28px; backdrop-filter: blur(12px); }
    .header { text-align: center; margin-bottom: 24px; }
    .badge { display: inline-block; background: linear-gradient(90deg,#818cf8,#a78bfa); color: #fff; font-size: 11px; font-family: monospace; letter-spacing: 3px; padding: 4px 14px; border-radius: 20px; margin-bottom: 12px; }
    h1 { font-size: 32px; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    input { width: 100%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 13px 14px; color: #f1f5f9; font-size: 15px; font-family: Georgia, serif; margin-bottom: 12px; }
    input:focus { outline: none; border-color: #818cf8; }
    .password-field { position: relative; }
    .password-field input { padding-right: 112px; }
    .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: auto; margin: 0; padding: 7px 10px; border-radius: 9px; border: 1px solid rgba(129,140,248,0.35); background: rgba(255,255,255,0.05); color: #cbd5e1; font-size: 12px; font-weight: bold; cursor: pointer; font-family: Georgia, serif; }
    button, a.btn { width: 100%; display: inline-flex; justify-content: center; align-items: center; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(90deg,#818cf8,#a78bfa); color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; font-family: Georgia, serif; text-decoration: none; margin-top: 6px; }
    .secondary { background: rgba(255,255,255,0.05) !important; border: 1.5px solid rgba(129,140,248,0.35) !important; color: #cbd5e1 !important; }
    .error { min-height: 20px; color: #fca5a5; font-size: 13px; margin: 8px 0; line-height: 1.5; }
    .links { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Entrar</h1>
      <p>Acesse sua conta para responder às atividades e acompanhar seu histórico.</p>
    </div>

    <form id="loginForm">
      <input id="email" type="email" placeholder="E-mail" required />
      <div class="password-field">
        <input id="password" type="password" placeholder="Senha" required />
        <button type="button" class="toggle-password" data-target="password">MOSTRAR</button>
      </div>
      <div id="error" class="error"></div>
      <button type="submit">ENTRAR</button>
    </form>

    <div class="links">
      <a class="btn secondary" href="/matricula/">FAZER MATRÍCULA</a>
      <a class="btn secondary" href="index.html">VOLTAR AO INÍCIO</a>
    </div>
  </div>

  <script>
    function getNextPage() {
      const params = new URLSearchParams(window.location.search);
      return params.get("next") || "index.html";
    }

    document.querySelectorAll(".toggle-password").forEach(function (button) {
      button.addEventListener("click", function () {
        const input = document.getElementById(button.dataset.target);
        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        button.textContent = isHidden ? "OCULTAR" : "MOSTRAR";
      });
    });

    document.getElementById("loginForm").addEventListener("submit", async function (event) {
      event.preventDefault();
      const error = document.getElementById("error");
      error.textContent = "";

      if (!window.Auth || !Auth.isConfigured()) {
        if (window.Auth && Auth.showConfigWarning) Auth.showConfigWarning();
        error.textContent = "Não foi possível carregar a configuração do Supabase. Atualize a página ou limpe o cache do navegador.";
        return;
      }

      try {
        await Auth.signIn(
          document.getElementById("email").value.trim(),
          document.getElementById("password").value
        );
        window.location.href = getNextPage();
      } catch (err) {
        error.textContent = err.message || "Não foi possível entrar.";
      }
    });
  </script>
</body>
</html>

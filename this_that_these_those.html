<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>This / That / These / Those Quiz</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="quiz_core.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    QuizCore.renderQuiz({
      title: "This · That · These · Those",
      smallTitle: true,
      feedbackPerfect: "Perfeito! Você domina o uso de This, That, These e Those!",
      questions: [
        { question: "___ is my book. (O livro está perto de mim.)", options: ["That", "This", "These", "Those"], answer: "This", explanation: "THIS é usado para objetos singulares que estão perto de quem fala." },
        { question: "___ are my friends. (Os amigos estão perto de mim.)", options: ["This", "That", "Those", "These"], answer: "These", explanation: "THESE é usado para objetos no plural que estão perto de quem fala." },
        { question: "___ is a dog. (O cachorro está longe de mim.)", options: ["This", "These", "That", "Those"], answer: "That", explanation: "THAT é usado para objetos singulares que estão longe de quem fala." },
        { question: "___ are big houses. (As casas estão longe de mim.)", options: ["This", "These", "That", "Those"], answer: "Those", explanation: "THOSE é usado para objetos no plural que estão longe de quem fala." },
        { question: "Is ___ your pen? (A caneta está na sua mão.)", options: ["those", "these", "that", "this"], answer: "this", explanation: "THIS é usado no singular para coisas próximas. 'Is this…?' é a forma interrogativa." },
        { question: "Are ___ your shoes? (Os sapatos estão no chão, longe de nós.)", options: ["this", "that", "these", "those"], answer: "those", explanation: "THOSE é usado no plural para coisas distantes." },
        { question: "___ apple is red. (A maçã está na minha mão.)", options: ["Those", "These", "That", "This"], answer: "This", explanation: "THIS qualifica um substantivo singular próximo: 'this apple'." },
        { question: "___ boys are my brothers. (Os meninos estão do outro lado da rua.)", options: ["This", "That", "These", "Those"], answer: "Those", explanation: "THOSE qualifica um substantivo plural distante: 'those boys'." },
        { question: "What is ___? It is a cat. (O gato está aqui, perto de mim.)", options: ["those", "these", "that", "this"], answer: "this", explanation: "THIS é usado para perguntar sobre algo singular e próximo: 'What is this?'" },
        { question: "___ flowers are beautiful. (As flores estão na mesa aqui perto.)", options: ["That", "This", "Those", "These"], answer: "These", explanation: "THESE qualifica um substantivo plural próximo: 'these flowers'." }
      ]
    });
  </script>
</body>
</html>

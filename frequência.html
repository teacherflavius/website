<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Frequência - Teacher Flávio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px 48px; font-family: Georgia, serif; color: #f1f5f9; }
    body.auth-checking .container { display: none; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .container { width: 100%; max-width: 760px; animation: fadeInUp 0.5s ease; }
    .top-links { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .top-link { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(129,140,248,0.35); border-radius: 10px; padding: 9px 16px; color: #818cf8; font-size: 13px; font-family: Georgia, serif; text-decoration: none; }
    .badge { display: inline-block; background: linear-gradient(90deg, #818cf8, #a78bfa); color: #fff; font-size: 11px; font-family: monospace; letter-spacing: 3px; padding: 4px 14px; border-radius: 20px; margin-bottom: 12px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { color: #f1f5f9; font-size: 38px; font-weight: bold; letter-spacing: -1px; margin-bottom: 8px; }
    .status { margin-top: 12px; color: #cbd5e1; font-size: 13px; line-height: 1.5; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(129,140,248,0.3), transparent); margin-bottom: 28px; }
    .panel { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 22px; backdrop-filter: blur(12px); margin-bottom: 16px; }
    .panel h2 { font-size: 20px; margin-bottom: 14px; color: #f1f5f9; }
    .record { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .record strong { display: block; color: #f1f5f9; font-size: 15px; margin-bottom: 6px; }
    .record p { color: #cbd5e1; font-size: 13px; line-height: 1.5; }
    .empty { color: #94a3b8; font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body class="auth-checking">
  <div class="container">
    <div class="top-links">
      <a class="top-link" href="index.html">HOME</a>
      <a class="top-link" href="area_do_estudante.html">ÁREA DO ESTUDANTE</a>
    </div>

    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Frequência</h1>
      <div id="loginStatus" class="status">Verificando acesso...</div>
    </div>

    <div class="divider"></div>

    <div class="panel">
      <h2>Histórico do aluno</h2>
      <div id="recordsList" class="empty">Carregando registros...</div>
    </div>
  </div>

  <script>
    let currentSession = null;
    let currentProfile = null;

    function redirectToLogin() {
      window.location.href = "login.html?next=" + encodeURIComponent("frequência.html");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadRecords() {
      const client = Auth.getClient();
      const response = await client
        .from("student_frequency")
        .select("id, class_date, attendance_status, class_notes, created_at")
        .eq("user_id", currentSession.user.id)
        .order("class_date", { ascending: false })
        .order("created_at", { ascending: false });

      if (response.error) throw response.error;
      return response.data || [];
    }

    async function renderRecords() {
      const list = document.getElementById("recordsList");

      try {
        const records = await loadRecords();

        if (!records.length) {
          list.className = "empty";
          list.textContent = "Nenhum registro cadastrado ainda.";
          return;
        }

        list.className = "";
        list.innerHTML = records.map(function (record) {
          return '<div class="record"><strong>' +
            escapeHtml(record.class_date) + ' — ' + escapeHtml(record.attendance_status) +
            '</strong><p>' + escapeHtml(record.class_notes || 'Sem observações.') + '</p></div>';
        }).join("");
      } catch (error) {
        list.className = "empty";
        list.textContent = "Não foi possível carregar os registros. Verifique se a tabela student_frequency foi criada no Supabase.";
      }
    }

    async function guardFrequencyPage() {
      if (!window.Auth || !Auth.isConfigured()) {
        if (window.Auth && Auth.showConfigWarning) Auth.showConfigWarning();
        document.body.classList.remove("auth-checking");
        const status = document.getElementById("loginStatus");
        if (status) status.textContent = "Supabase ainda não configurado.";
        return false;
      }

      currentSession = await Auth.getSession();

      if (!currentSession || !currentSession.user) {
        redirectToLogin();
        return false;
      }

      currentProfile = await Auth.getProfile();
      const status = document.getElementById("loginStatus");
      status.textContent = "Aluno: " + (currentProfile && currentProfile.name ? currentProfile.name : currentSession.user.email) + ".";
      document.body.classList.remove("auth-checking");
      await renderRecords();
      return true;
    }

    guardFrequencyPage();
  </script>
</body>
</html>

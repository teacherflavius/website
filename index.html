<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Flávio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
      font-family: Georgia, serif;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      width: 100%;
      max-width: 620px;
      animation: fadeInUp 0.5s ease;
    }

    .header {
      text-align: center;
      margin-bottom: 38px;
    }

    .header h1 {
      color: #f1f5f9;
      font-size: 38px;
      font-weight: bold;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(129,140,248,0.3), transparent);
      margin-bottom: 32px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .menu-button {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: #f1f5f9;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
      backdrop-filter: blur(12px);
    }

    .menu-button:hover {
      transform: translateY(-3px);
      border-color: rgba(129,140,248,0.5);
      background: rgba(129,140,248,0.07);
    }

    .menu-button span:first-child {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-button.enrollment {
      border-color: rgba(110,231,183,0.35);
      background: rgba(110,231,183,0.08);
    }

    .menu-button.enrollment .icon {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .arrow {
      color: #475569;
      font-size: 22px;
      transition: color 0.2s, transform 0.2s;
    }

    .menu-button:hover .arrow {
      color: #818cf8;
      transform: translateX(4px);
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 680px) {
      .menu-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Teacher Flávio</h1>
    </div>

    <div class="divider"></div>

    <div class="menu-grid">
      <a id="enrollmentCard" class="menu-button enrollment" href="matricula.html">
        <span><span class="icon">🪪</span>MATRÍCULA</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="area_do_estudante.html">
        <span><span class="icon">🎓</span>ÁREA DO ESTUDANTE</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="https://youtube.com/@teacherflavio" target="_blank" rel="noopener noreferrer">
        <span><span class="icon">▶️</span>YOUTUBE</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="https://whatsapp.com/channel/0029VbCQKL0BVJl6R3ZkGI33" target="_blank" rel="noopener noreferrer">
        <span><span class="icon">📚</span>AULAS DE GRAMÁTICA</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="https://www.instagram.com/teacher.flavius" target="_blank" rel="noopener noreferrer">
        <span><span class="icon">📸</span>INSTAGRAM</span>
        <span class="arrow">›</span>
      </a>
    </div>
  </div>

  <script>
    async function updateEnrollmentCardVisibility() {
      const enrollmentCard = document.getElementById("enrollmentCard");

      if (!enrollmentCard || !window.Auth || !Auth.isConfigured()) {
        return;
      }

      try {
        const session = await Auth.getSession();
        if (session && session.user) {
          enrollmentCard.classList.add("hidden");
        }
      } catch (error) {
        enrollmentCard.classList.remove("hidden");
      }
    }

    updateEnrollmentCardVisibility();
  </script>
</body>
</html>

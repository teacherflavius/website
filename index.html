<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Flávio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
      font-family: Georgia, serif;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      width: 100%;
      max-width: 620px;
      animation: fadeInUp 0.5s ease;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #818cf8, #a78bfa);
      color: #fff;
      font-size: 11px;
      font-family: monospace;
      letter-spacing: 3px;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .header {
      text-align: center;
      margin-bottom: 38px;
    }

    .header h1 {
      color: #f1f5f9;
      font-size: 38px;
      font-weight: bold;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .header p {
      color: #94a3b8;
      font-size: 15px;
      font-style: italic;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(129,140,248,0.3), transparent);
      margin-bottom: 32px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .menu-button {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: #f1f5f9;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
      backdrop-filter: blur(12px);
    }

    .menu-button:hover {
      transform: translateY(-3px);
      border-color: rgba(129,140,248,0.5);
      background: rgba(129,140,248,0.07);
    }

    .menu-button span:first-child {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .arrow {
      color: #475569;
      font-size: 22px;
      transition: color 0.2s, transform 0.2s;
    }

    .menu-button:hover .arrow {
      color: #818cf8;
      transform: translateX(4px);
    }

    @media (min-width: 680px) {
      .menu-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Área do Estudante</h1>
      <p>Escolha uma seção para acessar seus estudos, aulas e materiais.</p>
    </div>

    <div class="divider"></div>

    <div class="menu-grid">
      <a class="menu-button" href="#">
        <span><span class="icon">🗺️</span>ROTEIRO DE ESTUDOS</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="#">
        <span><span class="icon">▶️</span>YOUTUBE</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="exercicios.html">
        <span><span class="icon">🧩</span>EXERCÍCIOS</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="#">
        <span><span class="icon">🔗</span>LINKS DAS AULAS</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="#">
        <span><span class="icon">📚</span>AULAS DE GRAMÁTICA</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="#">
        <span><span class="icon">🎥</span>AULAS GRAVADAS</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="#">
        <span><span class="icon">📘</span>GUIA DO ESTUDANTE</span>
        <span class="arrow">›</span>
      </a>

      <a class="menu-button" href="#">
        <span><span class="icon">📸</span>INSTAGRAM</span>
        <span class="arrow">›</span>
      </a>
    </div>
  </div>
</body>
</html>

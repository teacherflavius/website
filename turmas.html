<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turmas - Teacher Flávio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js?v=20260429-1"></script>
  <script src="auth.js?v=20260429-1"></script>
  <link rel="stylesheet" href="professor.css?v=20260429-1">
  <style>
    .form-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px;
      backdrop-filter: blur(12px);
      margin-bottom: 22px;
    }
    .form-panel label { display:block; color:#cbd5e1; font-size:13px; margin:12px 0 6px; }
    .form-panel input {
      width:100%;
      background:rgba(255,255,255,0.06);
      border:1.5px solid rgba(255,255,255,0.12);
      border-radius:12px;
      padding:12px 13px;
      color:#f1f5f9;
      font-size:14px;
      font-family:Georgia, serif;
    }
    .form-panel input:focus { outline:none; border-color:#818cf8; }
    .class-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(12px);
    }
    .class-card-title {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:#f1f5f9;
      font-weight:bold;
      font-size:17px;
      text-decoration:none;
    }
    .class-actions { display:grid; grid-template-columns:1fr; gap:10px; }
    .open-class-button, .remove-class-button {
      width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      padding:11px 13px;
      font-family:Georgia, serif;
      font-weight:bold;
      cursor:pointer;
      text-decoration:none;
      font-size:13px;
    }
    .open-class-button { border:1.5px solid rgba(129,140,248,0.45); background:rgba(129,140,248,0.10); color:#c4b5fd; }
    .remove-class-button { border:1.5px solid rgba(248,113,113,0.45); background:rgba(248,113,113,0.08); color:#fca5a5; }
    .remove-class-button:disabled { opacity:0.65; cursor:not-allowed; }
    @media (min-width: 680px) { .class-actions { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body class="auth-checking">
  <div class="container">
    <div class="top-links">
      <a class="top-link" href="professor.html">ÁREA DO PROFESSOR</a>
      <a class="top-link" href="index.html">HOME</a>
    </div>

    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Turmas</h1>
      <div id="adminStatus" class="status">Verificando credenciais de professor...</div>
    </div>

    <div class="divider"></div>

    <div class="form-panel">
      <h2>Criar nova turma</h2>
      <form id="createClassForm">
        <label for="className">Nome da turma</label>
        <input id="className" type="text" placeholder="Ex.: Turma A1 - Terça e Quinta" />
        <button class="delete-button" type="submit" style="border-color:rgba(129,140,248,0.45); background:rgba(129,140,248,0.10); color:#c4b5fd;">CRIAR TURMA</button>
        <div id="classMessage" class="empty" style="margin-top:10px;"></div>
      </form>
    </div>

    <div id="classesGrid" class="menu-grid"></div>
  </div>

  <script src="turmas.js?v=20260429-1"></script>
  <script src="animated_cards.js?v=20260429-1"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aulas de Gramática - Teacher Flávio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js?v=20260430-3"></script>
  <script src="auth.js?v=20260430-3"></script>
  <link rel="stylesheet" href="aula_template.css?v=20260430-3">
  <style>
    body { align-items: flex-start; }
    .container { max-width: 980px; }
    .grammar-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
    .grammar-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 18px; backdrop-filter: blur(12px); }
    .grammar-card h2 { color: #f1f5f9; font-size: 20px; margin-bottom: 14px; line-height: 1.3; }
    .video-frame { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 14px; overflow: hidden; background: rgba(0,0,0,0.35); border: 1px solid rgba(129,140,248,0.35); margin-bottom: 14px; }
    .video-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    .exercise-link { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1.5px solid rgba(129,140,248,0.45); background: rgba(129,140,248,0.10); color: #c4b5fd; border-radius: 12px; padding: 11px 15px; font-family: Georgia, serif; font-size: 13px; font-weight: bold; letter-spacing: 0.4px; text-decoration: none; }
    .exercise-link:hover { background: rgba(129,140,248,0.18); border-color: rgba(129,140,248,0.75); }
    .empty, .error { color: #94a3b8; font-size: 14px; line-height: 1.6; text-align: center; padding: 18px; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; background: rgba(255,255,255,0.04); }
    .error { color: #fca5a5; }
  </style>
</head>
<body class="auth-checking">
  <div class="container">
    <div class="top-links">
      <a class="top-link" href="/area-do-estudante/">ÁREA DO ESTUDANTE</a>
      <a class="top-link" href="/">HOME</a>
    </div>

    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Aulas de Gramática</h1>
      <div id="loginStatus" class="status">Verificando acesso...</div>
    </div>

    <div class="divider"></div>
    <div id="grammarLessons" class="grammar-grid"></div>
  </div>

  <script>
    function redirectToLogin() {
      window.location.href = "login.html?next=" + encodeURIComponent("aulas-de-gramatica.html");
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    async function waitForAuthResources() {
      for (let i = 0; i < 10; i++) {
        if (window.Auth && window.SUPABASE_CONFIG && Auth.isConfigured()) return true;
        await sleep(150);
      }
      return !!(window.Auth && window.SUPABASE_CONFIG && Auth.isConfigured());
    }

    function setStatus(text) {
      const status = document.getElementById("loginStatus");
      if (status) status.textContent = text;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getEmbedUrl(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";
      try {
        const parsed = new URL(raw);
        if (parsed.hostname.includes("youtu.be")) {
          const id = parsed.pathname.replace("/", "");
          return id ? "https://www.youtube.com/embed/" + id : raw;
        }
        if (parsed.hostname.includes("youtube.com")) {
          const id = parsed.searchParams.get("v");
          if (id) return "https://www.youtube.com/embed/" + id;
          if (parsed.pathname.includes("/shorts/")) return "https://www.youtube.com/embed/" + parsed.pathname.split("/shorts/")[1].split("/")[0];
          if (parsed.pathname.includes("/embed/")) return raw;
        }
        if (parsed.hostname.includes("drive.google.com")) {
          const match = raw.match(/\/file\/d\/([^/]+)/);
          if (match && match[1]) return "https://drive.google.com/file/d/" + match[1] + "/preview";
        }
      } catch (error) {}
      return raw;
    }

    function renderLessons(lessons) {
      const target = document.getElementById("grammarLessons");
      if (!lessons || lessons.length === 0) {
        target.innerHTML = '<div class="empty">Nenhuma aula de gramática foi cadastrada ainda.</div>';
        return;
      }

      target.innerHTML = lessons.map(function (lesson) {
        const title = escapeHtml(lesson.title);
        const embedUrl = escapeHtml(getEmbedUrl(lesson.video_url));
        const exerciseUrl = escapeHtml(lesson.exercise_url);
        return '<article class="grammar-card">' +
          '<h2>' + title + '</h2>' +
          '<div class="video-frame"><iframe src="' + embedUrl + '" title="' + title + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>' +
          '<a class="exercise-link" href="' + exerciseUrl + '" target="_blank" rel="noopener noreferrer">📝 ABRIR EXERCÍCIOS</a>' +
        '</article>';
      }).join("");
    }

    async function loadGrammarLessons() {
      const client = Auth.getClient();
      const response = await client
        .from("grammar_lessons")
        .select("id,title,video_url,exercise_url,created_at")
        .order("created_at", { ascending: false });

      if (response.error) throw response.error;
      renderLessons(response.data || []);
    }

    async function guardPage() {
      const resourcesReady = await waitForAuthResources();
      if (!resourcesReady) {
        setStatus("Não foi possível carregar a autenticação. Atualize a página ou limpe o cache do navegador.");
        document.body.classList.remove("auth-checking");
        return;
      }

      const session = await Auth.getSession();
      if (!session || !session.user) {
        redirectToLogin();
        return;
      }

      setStatus("Aluno conectado: " + session.user.email + ".");
      document.body.classList.remove("auth-checking");

      try {
        await loadGrammarLessons();
      } catch (error) {
        document.getElementById("grammarLessons").innerHTML = '<div class="error">Não foi possível carregar as aulas de gramática. Execute o arquivo supabase_aulas_de_gramatica.sql no Supabase.</div>';
      }
    }

    guardPage();
  </script>
  <script src="animated_cards.js?v=20260430-3"></script>
</body>
</html>

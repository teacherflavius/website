<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - Teacher Flávio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); display: flex; align-items: center; justify-content: center; padding: 32px 16px; font-family: Georgia, serif; color: #f1f5f9; }
    .box { width: 100%; max-width: 440px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 28px; backdrop-filter: blur(12px); }
    .header { text-align: center; margin-bottom: 24px; }
    .badge { display: inline-block; background: linear-gradient(90deg,#818cf8,#a78bfa); color: #fff; font-size: 11px; font-family: monospace; letter-spacing: 3px; padding: 4px 14px; border-radius: 20px; margin-bottom: 12px; }
    h1 { font-size: 32px; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    input { width: 100%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 13px 14px; color: #f1f5f9; font-size: 15px; font-family: Georgia, serif; margin-bottom: 12px; }
    input:focus { outline: none; border-color: #818cf8; }
    button, a.btn { width: 100%; display: inline-flex; justify-content: center; align-items: center; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(90deg,#818cf8,#a78bfa); color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; font-family: Georgia, serif; text-decoration: none; margin-top: 6px; }
    .secondary { background: rgba(255,255,255,0.05) !important; border: 1.5px solid rgba(129,140,248,0.35) !important; color: #cbd5e1 !important; }
    .error { min-height: 20px; color: #fca5a5; font-size: 13px; margin: 8px 0; }
    .success { color: #6ee7b7; font-size: 13px; line-height: 1.5; margin: 8px 0; }
    .links { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="header">
      <div><span class="badge">TEACHER FLÁVIO</span></div>
      <h1>Criar conta</h1>
      <p>Cadastre-se para salvar suas pontuações e acompanhar seu histórico.</p>
    </div>

    <form id="signupForm">
      <input id="name" type="text" placeholder="Nome completo" required />
      <input id="email" type="email" placeholder="E-mail" required />
      <input id="password" type="password" placeholder="Senha" minlength="6" required />
      <div id="message" class="error"></div>
      <button type="submit">CRIAR CONTA</button>
    </form>

    <div class="links">
      <a class="btn secondary" href="login.html">JÁ TENHO CONTA</a>
      <a class="btn secondary" href="index.html">VOLTAR AO INÍCIO</a>
    </div>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async function (event) {
      event.preventDefault();
      const message = document.getElementById("message");
      message.className = "error";
      message.textContent = "";

      if (!Auth.isConfigured()) {
        Auth.showConfigWarning();
        message.textContent = "Supabase ainda não configurado.";
        return;
      }

      try {
        await Auth.signUp(
          document.getElementById("name").value.trim(),
          document.getElementById("email").value.trim(),
          document.getElementById("password").value
        );
        message.className = "success";
        message.textContent = "Conta criada. Se o Supabase solicitar confirmação de e-mail, confirme sua conta antes de entrar.";
      } catch (err) {
        message.className = "error";
        message.textContent = err.message || "Não foi possível criar a conta.";
      }
    });
  </script>
</body>
</html>
